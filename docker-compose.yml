services:
  backend:
    build: ./backend
    ports:
      - "9000:9000"
    volumes:
      - ./backend:/app
      - /app/node_modules
    environment:
      - NODE_ENV=development
      - TZ=Asia/Kolkata
    mem_limit: 2g

  frontend:
    build: ./frontend
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://localhost:9000/api
      - NODE_OPTIONS=--max-old-space-size=4096
    mem_limit: 4g
    memswap_limit: 4g
    depends_on:
      - backend
