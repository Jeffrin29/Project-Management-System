services:
  backend:
    build: ./backend
    ports:
      - "9000:9000"
    dns:
      - 8.8.8.8
      - 1.1.1.1
    volumes:
      - ./backend:/app
      - /app/node_modules
      - ./backend/uploads:/app/uploads
    environment:
      - PORT=9000
      - NODE_ENV=development
      - MONGODB_URI=mongodb+srv://mjeffrin040_db_user:Test12345@cluster0.nfljew1.mongodb.net/lansub_db
      - JWT_ACCESS_SECRET=pm_lansub_access_secret_123
      - JWT_REFRESH_SECRET=pm_lansub_refresh_secret_123
      - JWT_ACCESS_EXPIRES=15m
      - JWT_REFRESH_EXPIRES=7d
      - CORS_ORIGIN=http://98.70.44.251:4000
      - UPLOAD_DIR=uploads
      - MAX_FILE_SIZE=10485760
      - RATE_LIMIT_WINDOW_MS=900000
      - RATE_LIMIT_MAX=100
      - BCRYPT_SALT_ROUNDS=12
      - LOG_LEVEL=info
      - TZ=Asia/Kolkata
    restart: unless-stopped
    mem_limit: 2g

  frontend:
    build: ./frontend
    ports:
      - "4000:4000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      - NEXT_PUBLIC_API_URL=http://98.70.44.251:9000/api
      - TZ=Asia/Kolkata
      - NODE_OPTIONS=--max-old-space-size=4096
    mem_limit: 4g
    memswap_limit: 4g
    depends_on:
      - backend
    restart: unless-stopped
